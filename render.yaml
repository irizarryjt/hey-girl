# Render Blueprint — deploys Hey Girl as a single web service that serves the
# landing page, the app, and the /api proxy together.
# In Render: New + → Blueprint → connect this repo. Then set ANTHROPIC_API_KEY.
services:
  - type: web
    name: hey-girl
    runtime: node
    plan: free
    # --include=dev so Vite (a devDependency) is available during build,
    # since Render sets NODE_ENV=production which would otherwise skip it.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false            # set this secret in the Render dashboard
      - key: SITE_PASSWORD
        sync: false            # set this to keep the site private (preview)
      - key: VITE_SUPABASE_URL
        sync: false            # Supabase project URL (browser-safe)
      - key: VITE_SUPABASE_ANON_KEY
        sync: false            # Supabase anon/public key (browser-safe)
      - key: SUPABASE_URL
        sync: false            # same project URL, for the server
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false            # SECRET — server only, powers guest links
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: NODE_VERSION
        value: "22"
